<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submitted Data</title>

<style>
body{
    font-family: Arial;
    background:#fefae0;
    text-align:center;
    padding:50px;
}

.container{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    width:400px;
    margin:auto;
}

h2{
    color:#d97706;
}

pre{
    background:#f4f4f4;
    padding:10px;
    border-radius:10px;
    text-align:left;
}

ul{
    list-style:none;
    padding:0;
}

li{
    margin:10px 0;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#d97706;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#b45309;
}
</style>

</head>

<body>

<div class="container">

<h2>Form Submitted Successfully ✅</h2>

<h3>Dictionary Format:</h3>
<pre>
{{ data }}
</pre>

<h3>Formatted Output:</h3>
<ul>
    <li><b>Name:</b> {{ data.name }}</li>
    <li><b>Email:</b> {{ data.email }}</li>
    <li><b>Message:</b> {{ data.message }}</li>
</ul>
<a href="{{ url_for('contact') }}"><button>Go Back</button></a>
</div>

</body>
</html>
